<!doctype html>
<html lang="{{ site.Language.LanguageCode | default `en` }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.tagline }}{{ end }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ `css/main.css` | relURL }}">
  </head>
  <body class="min-h-screen bg-black font-body text-slate-100">
    <div class="mx-auto flex min-h-screen max-w-5xl flex-col px-6 py-10 sm:px-10">
      <header class="flex flex-col gap-6 border-b border-slate-800 pb-6 sm:flex-row sm:items-end sm:justify-between">
        <div class="space-y-2">
          <a class="text-2xl font-semibold tracking-tight text-white" href="{{ `/` | relURL }}">{{ site.Title }}</a>
          <p class="max-w-2xl text-sm text-slate-400">{{ site.Params.tagline }}</p>
        </div>
        <nav class="flex items-center gap-4 text-sm text-slate-300">
          <a class="transition hover:text-emerald-300" href="{{ `/` | relURL }}">Home</a>
        </nav>
      </header>

      <main class="flex-1 py-12">
        {{ block "main" . }}{{ end }}
      </main>

      <footer class="border-t border-slate-800 pt-6 text-sm text-slate-500">
        Built with Hugo and Tailwind CSS.
      </footer>
    </div>
  </body>
</html>
