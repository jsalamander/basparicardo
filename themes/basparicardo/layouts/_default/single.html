{{ define "main" }}
  {{ if eq .File.BaseFileName "past-shows" }}
    {{ partial "past-shows.html" . }}
  {{ else }}
    <article class="space-y-6">
      <header class="space-y-3">
        <p class="text-sm font-medium uppercase tracking-[0.3em] text-emerald-300">Page</p>
        <h1 class="text-4xl font-bold tracking-tight text-white">{{ .Title }}</h1>
      </header>

      <div class="space-y-6 text-base leading-7 text-slate-300">
        {{ .Content }}
      </div>
    </article>
  {{ end }}
{{ end }}
